<style>
/* ===== PSAT 정답·해설 모음 — 차분한 PSAT 친화 테마 ===== */
:root{
  --bg:        #eef2f7;   /* 블루그레이 배경 */
  --surface:   #ffffff;
  --ink:       #2a2e35;
  --ink-soft:  #68707c;
  --line:      #e1e7f0;
  --accent:    #2c4068;   /* 네이비 (메인) */
  --accent-d:  #1e2e4d;   /* 딥 네이비 */
  --accent-bg: #e6ecf5;
  --blue:      #3388c6;   /* PSAT 블루 (보조·다운로드) */
  --chest:     #9b5e2c;   /* 밤 브라운 포인트 */
  --warn:      #b5814a;   /* 무료 배지 */
  --warn-bg:   #f6edde;
  --premium:   #4a6b8a;   /* 프리미엄 링크 */
  --premium-bg:#e7eef4;
  --blog:      #6a5a82;   /* 블로그 링크 */
  --blog-bg:   #eee9f3;
  --radius:    12px;
  --shadow:    0 1px 3px rgba(30,40,60,.06), 0 4px 16px rgba(30,40,60,.05);
}

*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  font-family:"Noto Sans KR",system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:880px;margin:0 auto;padding:0 18px;}

/* ===== 헤더 ===== */
.site-header{
  background:linear-gradient(160deg,#33507f 0%,#1e2e4d 100%);
  color:#fff;
  padding:34px 0 30px;
  box-shadow:var(--shadow);
}
.site-header h1{margin:0;font-size:1.55rem;font-weight:700;letter-spacing:-.02em;}
.subtitle{margin:8px 0 0;color:#dcebe6;color:rgba(255,255,255,.85);font-size:.95rem;}

/* 헤더 액션 버튼 (즐겨찾기·공유) */
.header-actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
.hbtn{
  appearance:none;cursor:pointer;font-family:inherit;
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:999px;
  background:rgba(255,255,255,.16);
  border:1.5px solid rgba(255,255,255,.55);
  color:#fff;font-size:.9rem;font-weight:600;text-decoration:none;
  transition:background .15s,transform .05s;
}
.hbtn:hover{background:rgba(255,255,255,.28);}
.hbtn:active{transform:translateY(1px);}

/* 토스트 알림 */
.toast{
  position:fixed;left:50%;bottom:30px;
  transform:translateX(-50%) translateY(18px);
  background:#2b3137;color:#fff;
  padding:12px 20px;border-radius:11px;
  font-size:.92rem;font-weight:500;max-width:90vw;text-align:center;
  box-shadow:0 6px 24px rgba(0,0,0,.22);
  opacity:0;pointer-events:none;z-index:1000;
  transition:opacity .25s,transform .25s;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* 링크 공유 팝업 */
.share-pop{
  position:fixed;inset:0;z-index:1100;padding:20px;
  background:rgba(30,40,36,.45);
  display:flex;align-items:center;justify-content:center;
}
.share-box{
  background:#fff;border-radius:14px;padding:22px 22px 18px;
  max-width:400px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.25);
}
.share-box h3{margin:0 0 6px;font-size:1.05rem;color:var(--ink);}
.share-box p{margin:0 0 12px;font-size:.88rem;color:var(--ink-soft);}
.share-box input{
  width:100%;box-sizing:border-box;padding:10px 12px;
  border:1.5px solid var(--line);border-radius:8px;
  font-size:.9rem;font-family:inherit;color:var(--ink);background:#fafbfb;
}
.share-actions{display:flex;gap:8px;margin-top:14px;justify-content:flex-end;}
.sp-primary{
  background:var(--accent);color:#fff;border:none;
  padding:9px 18px;border-radius:8px;font-weight:600;
  cursor:pointer;font-family:inherit;font-size:.9rem;
}
.sp-primary:hover{filter:brightness(1.05);}
.sp-ghost{
  background:#f0f2f2;color:var(--ink-soft);border:none;
  padding:9px 16px;border-radius:8px;
  cursor:pointer;font-family:inherit;font-size:.9rem;
}

/* ===== 공지 콜아웃 ===== */
.notice{
  display:flex;align-items:flex-start;gap:10px;
  background:#fbf3e3;
  border:1px solid #ecdcbf;
  border-left:4px solid var(--chest);
  border-radius:10px;
  padding:11px 16px;
  margin:0 0 16px;
}
.notice-ico{font-size:1.05rem;line-height:1.5;}
.notice-text{margin:0;font-size:.92rem;color:#5e4d33;line-height:1.5;}
.notice-text strong{color:var(--chest);font-weight:700;}

/* ===== 단계 섹션 ===== */
main.wrap{padding-top:26px;padding-bottom:48px;}
.step{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px 18px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
  transition:opacity .2s;
}
.step.is-disabled{opacity:.55;}
.step.is-hidden{display:none;}
.step-label{
  display:flex;align-items:center;flex-wrap:wrap;gap:6px 9px;
  font-weight:700;font-size:.95rem;color:var(--ink);
  margin-bottom:12px;
}
.step-note{font-size:.8rem;font-weight:400;color:var(--ink-soft);}
.step-num{
  display:inline-flex;align-items:center;justify-content:center;
  width:24px;height:24px;border-radius:50%;
  background:var(--accent-bg);color:var(--accent-d);
  font-size:.8rem;font-weight:700;
}
.hint{color:var(--ink-soft);font-size:.9rem;}

/* ===== 칩 버튼 ===== */
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{
  appearance:none;border:1.5px solid var(--line);
  background:#fafbfb;color:var(--ink);
  padding:7px 15px;border-radius:999px;
  font-size:.92rem;font-weight:500;font-family:inherit;
  cursor:pointer;transition:all .15s;
}
.chip:hover{border-color:var(--accent);color:var(--accent-d);}
.chip.active{
  background:var(--accent);border-color:var(--accent);color:#fff;
  box-shadow:0 2px 6px rgba(44,64,104,.32);
}
.chip.year-chip{min-width:62px;text-align:center;}

/* ===== 결과 ===== */
.result{margin-top:6px;}
.placeholder{
  text-align:center;color:var(--ink-soft);
  padding:46px 20px;border:1.5px dashed var(--line);
  border-radius:var(--radius);background:var(--surface);
}
.result-head{
  display:flex;flex-wrap:wrap;align-items:baseline;gap:10px;
  margin:6px 2px 14px;
}
.result-title{font-size:1.2rem;font-weight:700;letter-spacing:-.01em;color:var(--acc,var(--accent-d));}
.result-meta{color:var(--ink-soft);font-size:.9rem;}

/* 영역별 강조색 (결과 영역에 적용) */
#result.area-lang{--acc:#d6534a;--acc-bg:#fbeae8;}
#result.area-data{--acc:#2f9e68;--acc-bg:#e7f4ec;}
#result.area-sit{--acc:#3a86c8;--acc-bg:#e6f1fa;}

/* ===== 표 ===== */
.tables-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start;}
.table-card{
  background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);
}
table.answers{width:100%;border-collapse:collapse;font-size:.95rem;table-layout:fixed;}
table.answers th,table.answers td{
  padding:11px 14px;text-align:left;border-bottom:1px solid var(--line);
}
table.answers thead th{
  background:var(--acc-bg,var(--accent-bg));color:var(--acc,var(--accent-d));
  font-weight:700;font-size:.85rem;
  position:sticky;top:0;
}
table.answers tbody tr:last-child td{border-bottom:none;}
table.answers tbody tr:hover{background:#f7faf9;}
.col-no{width:64px;color:var(--ink-soft);font-weight:500;white-space:nowrap;}
.col-ans,.cell-answer{width:72px;}
.cell-answer{font-size:1.28rem;font-weight:700;color:var(--ink);}

/* 해설 링크 버튼 */
.sol-links{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.sol-link{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 11px;border-radius:7px;
  font-size:.83rem;font-weight:500;text-decoration:none;
  transition:filter .12s;
}
.sol-link:hover{filter:brightness(1.06);}
/* 무게 위계: 블로그(가장 가벼움) → 프리미엄(무료) → 프리미엄(유료, 가장 진중) */
.sol-link.premium{background:#36434d;color:#fff;font-weight:600;}          /* 유료·고퀄 */
.sol-link.premium-free{background:#6f94a3;color:#fff;}                     /* 무료 제공 */
.sol-link.blog{background:#eef1f1;color:#79838b;border:1px solid #e2e7e6;} /* 완전 무료·열화판 */
.sol-link.blog:hover{filter:brightness(.97);}
.no-sol{color:#aeb6b3;font-size:.85rem;}

/* 기출문제 PDF 다운로드 버튼 */
.dl-row{margin:0 0 14px;}
.dl-btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:11px 20px;border-radius:10px;
  background:var(--blue);color:#fff;
  font-size:.95rem;font-weight:700;text-decoration:none;
  box-shadow:0 2px 8px rgba(51,136,198,.28);
  transition:filter .12s,transform .05s;
}
.dl-btn:hover{filter:brightness(1.05);}
.dl-btn:active{transform:translateY(1px);}
.dl-ico{font-size:1.05rem;}

/* 정답 한눈에 보기 */
.quick-answers{
  background:var(--acc-bg,var(--surface));border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px 16px;margin-bottom:14px;
}
.quick-answers h3{margin:0 0 10px;font-size:.9rem;color:var(--acc,var(--ink-soft));font-weight:700;}
.qa-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;}
.qa-cell{
  text-align:center;background:#fff;border:1px solid var(--line);
  border-radius:7px;padding:5px 2px;
}
.qa-cell .n{display:block;font-size:.7rem;color:var(--ink-soft);}
.qa-cell .a{display:block;font-size:1.1rem;font-weight:700;color:var(--ink);}

/* ===== 푸터 ===== */
.site-footer{border-top:1px solid var(--line);background:var(--surface);padding:18px 0;}
.site-footer .wrap{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:8px 18px;}
.site-footer .foot-label{color:var(--ink-soft);font-weight:700;font-size:.85rem;}
.site-footer a{color:var(--blue);text-decoration:none;font-size:.9rem;font-weight:600;}
.site-footer a:hover{text-decoration:underline;}

@media (max-width:560px){
  .site-header h1{font-size:1.3rem;}
  table.answers th,table.answers td{padding:9px 10px;}
  .col-no{width:56px;}
  .result-title{font-size:1.05rem;}
  .qa-grid{grid-template-columns:repeat(5,1fr);}
  /* 모바일에서는 2열을 1열로 쌓되, 둘째 표를 첫째 표에 이어 붙여
     하나의 연속된 표처럼 보이게 한다(중간 헤더 제거). */
  .tables-2col{grid-template-columns:1fr;gap:0;}
  .tables-2col .table-card:first-child:not(:last-child){
    border-bottom-left-radius:0;border-bottom-right-radius:0;
  }
  .tables-2col .table-card:last-child:not(:first-child){
    border-top:none;border-top-left-radius:0;border-top-right-radius:0;
  }
  .tables-2col .table-card:last-child:not(:first-child) thead{display:none;}
}

</style>
</head>
<body>
<header class="site-header">
  <div class="wrap">
    <h1>🌰 PSAT 기출 정답·해설 모음</h1>
    <p class="subtitle">시험구분 → 연도 → 영역을 고르면 문항별 정답과 해설 링크를 보여드립니다.</p>
    <div class="header-actions">
      <button id="btn-bookmark" class="hbtn" type="button"><span aria-hidden="true">☆</span> 즐겨찾기</button>

    </div>
  </div>
</header>

<main class="wrap">
  <!-- 공지사항 콜아웃 -->
  <section class="notice" aria-label="공지사항">
    <span class="notice-ico" aria-hidden="true">📢</span>
    <p class="notice-text"><strong>2026 7급 총평 라이브</strong> 시험 당일 8시 → <a href="https://www.youtube.com/live/xrlqj5V2X7U?si=uGh9_554fIiI0ClX" target="_blank" rel="noopener">링크</a></p>
  </section>

  <!-- 1단계: 시험구분 -->
  <section class="step" id="step-cat">
    <div class="step-label"><span class="step-num">1</span> 시험구분</div>

  <!-- 2단계: 연도 -->
  <section class="step is-disabled" id="step-year">
    <div class="step-label"><span class="step-num">2</span> 연도 <span class="step-note" id="year-note"></span></div>
    <div class="chips" id="year-chips"><span class="hint">먼저 시험구분을 선택하세요.</span></div>

  <!-- 3단계: 영역 -->
  <section class="step is-disabled" id="step-area">
    <div class="step-label"><span class="step-num">3</span> 영역</div>
    <div class="chips" id="area-chips"><span class="hint">먼저 연도를 선택하세요.</span></div>
  </section>

  <!-- 책형 (필요 시) -->
  <section class="step is-hidden" id="step-book">
    <div class="step-label"><span class="step-num">★</span> 책형</div>
    <div class="chips" id="book-chips"></div>
  </section>

  <!-- 결과 -->
  <section id="result" class="result">
    <div class="placeholder" id="placeholder">
      <p>위에서 시험구분·연도·영역을 선택하면 정답표가 나타납니다.</p>
    </div>
  </section>
</main>

<footer class="site-footer">

  </div>
</footer>

<script>
/* ===== PSAT 정답·해설 모음 — 앱 로직 ===== */
(function () {
  "use strict";

  const DATA = window.PSAT_DATA || [];
  const META = window.PSAT_META || {};
  const ORDER = window.PSAT_ORDER || { cat: [], area: [] };
  const PDF = window.PSAT_PDF || {};
  // 배포 사이트(http/https)에서는 상대경로, 로컬 파일로 단독 실행 시엔 라이브 사이트 절대경로
  const PDF_BASE = (location.protocol === "file:")
    ? "https://bamdori-psat.github.io/psat-answer/"
    : "";

  const state = { cat: null, year: null, area: null, book: null };

  const el = {
    catChips: document.getElementById("cat-chips"),
    yearChips: document.getElementById("year-chips"),
    areaChips: document.getElementById("area-chips"),
    bookChips: document.getElementById("book-chips"),
    stepYear: document.getElementById("step-year"),
    stepArea: document.getElementById("step-area"),
    stepBook: document.getElementById("step-book"),
    result: document.getElementById("result"),
  };

  /* ---------- 유틸 ---------- */
  function ykSort(a, b) {
    const ya = parseInt(a, 10), yb = parseInt(b, 10);
    if (yb !== ya) return yb - ya;
    // 같은 연도면, 접미(외교·추가채용 등)가 붙은 변형을 뒤로
    const sa = a.includes(" ") ? 1 : 0, sb = b.includes(" ") ? 1 : 0;
    if (sa !== sb) return sa - sb;
    return a.localeCompare(b, "ko");
  }
  function makeChip(label, cls) {
    const b = document.createElement("button");
    b.className = "chip" + (cls ? " " + cls : "");
    b.type = "button";
    b.textContent = label;
    return b;
  }
  function clearActive(container) {
    container.querySelectorAll(".chip.active").forEach((c) => c.classList.remove("active"));
  }
  function setEnabled(stepEl, on) {
    stepEl.classList.toggle("is-disabled", !on);
  }

  /* ---------- 1단계: 시험구분 ---------- */
  function renderCategories() {
    el.catChips.innerHTML = "";
    ORDER.cat.forEach((cat) => {
      if (!META[cat]) return;
      const chip = makeChip(cat);
      chip.addEventListener("click", () => selectCategory(cat, chip));
      el.catChips.appendChild(chip);
    });
  }

  function selectCategory(cat, chip) {
    state.cat = cat;
    state.year = null;
    state.area = null;
    state.book = null;
    clearActive(el.catChips);
    chip.classList.add("active");
    renderYears();
    resetArea();
    hideBook();
    renderResult();
  }

  /* ---------- 2단계: 연도 ---------- */
  function renderYears() {
    el.yearChips.innerHTML = "";
    setEnabled(el.stepYear, true);
    const note = document.getElementById("year-note");
    if (note) {
      note.textContent = (state.cat === "민경채")
        ? "※ 2022년 이후의 민경채 문항은 7급과 통합되었습니다. 7급 정답을 이용하세요."
        : "";
    }
    const years = Object.keys(META[state.cat]).sort(ykSort);
    years.forEach((y) => {
      const chip = makeChip(y, "year-chip");
      chip.addEventListener("click", () => selectYear(y, chip));
      el.yearChips.appendChild(chip);
    });
  }

  function selectYear(year, chip) {
    state.year = year;
    state.area = null;
    state.book = null;
    clearActive(el.yearChips);
    chip.classList.add("active");
    renderAreas();
    hideBook();
    renderResult();
  }

  function resetArea() {
    el.areaChips.innerHTML = '<span class="hint">먼저 연도를 선택하세요.</span>';
    setEnabled(el.stepArea, false);
  }

  /* ---------- 3단계: 영역 ---------- */
  function renderAreas() {
    el.areaChips.innerHTML = "";
    setEnabled(el.stepArea, true);
    const avail = META[state.cat][state.year];
    ORDER.area.forEach((area) => {
      if (!avail[area]) return;
      const chip = makeChip(area);
      chip.addEventListener("click", () => selectArea(area, chip));
      el.areaChips.appendChild(chip);
    });
  }

  function selectArea(area, chip) {
    state.area = area;
    state.book = null;
    clearActive(el.areaChips);
    chip.classList.add("active");
    const books = META[state.cat][state.year][area] || [];
    if (books.length > 1) {
      renderBooks(books);
    } else {
      state.book = books[0] || null;
      hideBook();
      renderResult();
    }
  }

  /* ---------- 책형 (다중일 때만) ---------- */
  function renderBooks(books) {
    el.bookChips.innerHTML = "";
    el.stepBook.classList.remove("is-hidden");
    books.forEach((b) => {
      const chip = makeChip(b + "책형");
      chip.addEventListener("click", () => {
        state.book = b;
        clearActive(el.bookChips);
        chip.classList.add("active");
        renderResult();
      });
      el.bookChips.appendChild(chip);
    });
    // 결과는 책형 선택 전까지 안내
    el.result.innerHTML =
      '<div class="placeholder"><p>책형이 여러 개입니다. 위에서 책형을 선택하세요.</p></div>';
  }
  function hideBook() {
    el.stepBook.classList.add("is-hidden");
    el.bookChips.innerHTML = "";
  }

  /* ---------- 결과 표 ---------- */
  const AREA_CLASS = { "언어논리": "area-lang", "자료해석": "area-data", "상황판단": "area-sit" };

  function renderResult() {
    el.result.className = "result";
    if (!state.cat || !state.year || !state.area) {
      el.result.innerHTML =
        '<div class="placeholder"><p>위에서 시험구분·연도·영역을 선택하면 정답표가 나타납니다.</p></div>';
      return;
    }
    if (!state.book) return; // 책형 선택 대기

    const rows = DATA.filter(
      (r) =>
        r.c === state.cat &&
        r.yk === state.year &&
        r.a === state.area &&
        r.b === state.book
    ).sort((a, b) => (a.n || 0) - (b.n || 0));

    if (!rows.length) {
      el.result.innerHTML = '<div class="placeholder"><p>해당 조건의 데이터가 없습니다.</p></div>';
      return;
    }

    el.result.className = "result " + (AREA_CLASS[state.area] || "");
    const examLabel = rows[0].label || `${state.year} ${state.cat}`;
    const bookLabel = state.book ? `${state.book}책형 · ` : "";
    let html = "";
    html += '<div class="result-head">';
    html += `<span class="result-title">${examLabel} ${state.area}</span>`;
    html += `<span class="result-meta">${bookLabel}총 ${rows.length}문항</span>`;
    html += "</div>";

    // 기출문제 원본 PDF 다운로드 (정답 한눈에 보기 바로 위)
    const pdfPath = PDF[`${state.cat}|${state.year}|${state.area}`];
    if (pdfPath) {
      const dlName = `${examLabel.replace(/\s+/g, "_")}_${state.area}.pdf`;
      html +=
        `<div class="dl-row"><a class="dl-btn" href="${encodeURI(PDF_BASE + pdfPath)}" ` +
        `download="${dlName}" target="_blank" rel="noopener" ` +
        `data-ev="pdf" data-exam="${examLabel}" data-area="${state.area}">` +
        `<span class="dl-ico">📄</span> 기출문제 원본 다운로드 (PDF)</a></div>`;
    }

    // 정답 한눈에 보기
    html += '<div class="quick-answers"><h3>정답 한눈에 보기</h3><div class="qa-grid">';
    rows.forEach((r) => {
      html += `<div class="qa-cell"><span class="n">${r.n}</span><span class="a">${r.s || "-"}</span></div>`;
    });
    html += "</div></div>";

    // 상세 표 — 좌우 2열로 분할
    const mid = Math.ceil(rows.length / 2);
    const halves = [rows.slice(0, mid), rows.slice(mid)];
    html += '<div class="tables-2col">';
    halves.forEach((half) => {
      if (!half.length) return;
      html += '<div class="table-card"><table class="answers">';
      html += "<thead><tr><th class='col-no'>문항</th><th class='col-ans'>정답</th><th>해설</th></tr></thead><tbody>";
      half.forEach((r) => {
        html += "<tr>";
        html += `<td class="col-no">${r.n}번</td>`;
        html += `<td class="cell-answer">${r.s || "-"}</td>`;
        html += `<td>${solutionCell(r)}</td>`;
        html += "</tr>";
      });
      html += "</tbody></table></div>";
    });
    html += "</div>";

    el.result.innerHTML = html;
  }

  function solutionCell(r) {
    const parts = [];
    const itemId = `${r.label} ${r.a} ${r.n}번`;
    const ev = `data-ev="solution" data-exam="${r.label}" data-area="${r.a}" data-q="${r.n}" data-item="${itemId}"`;
    if (r.p) {
      const cls = r.free ? "premium-free" : "premium";
      const label = r.free ? "프리미엄 해설(무료)" : "프리미엄 해설";
      const type = r.free ? "premium_free" : "premium";
      parts.push(
        `<a class="sol-link ${cls}" href="${r.p}" target="_blank" rel="noopener" ${ev} data-type="${type}">${label}</a>`
      );
    }
    if (r.g) {
      parts.push(
        `<a class="sol-link blog" href="${r.g}" target="_blank" rel="noopener" ${ev} data-type="blog">블로그 해설</a>`
      );
    }
    if (!parts.length) return '<span class="no-sol">—</span>';
    return `<div class="sol-links">${parts.join("")}</div>`;
  }

  /* ---------- 즐겨찾기 · 공유 ---------- */
  function showToast(msg) {
    const t = document.getElementById("toast");
    if (!t) return;
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(t._tid);
    t._tid = setTimeout(() => t.classList.remove("show"), 2800);
  }

  function shareUrl() {
    // 해시·쿼리를 뺀 깔끔한 주소
    return location.origin + location.pathname;
  }

  // 구형 폴백 복사 (제한 환경에서도 동작)
  function legacyCopy(text) {
    try {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly", "");
      ta.style.position = "fixed";
      ta.style.top = "-9999px";
      document.body.appendChild(ta);
      ta.select();
      ta.setSelectionRange(0, text.length);
      const ok = document.execCommand("copy");
      document.body.removeChild(ta);
      return ok;
    } catch (e) {
      return false;
    }
  }

  async function copyLink(url) {
    if (navigator.clipboard && window.isSecureContext) {
      try { await navigator.clipboard.writeText(url); return true; } catch (e) {/* 폴백 */}
    }
    return legacyCopy(url);
  }

  // 자동 복사가 막힌 환경용 링크 팝업
  function openSharePopup(url) {
    const old = document.getElementById("share-pop");
    if (old) old.remove();
    const ov = document.createElement("div");
    ov.id = "share-pop";
    ov.className = "share-pop";
    ov.innerHTML =
      '<div class="share-box" role="dialog" aria-modal="true" aria-label="링크 공유">' +
      "<h3>링크 공유</h3>" +
      "<p>아래 주소를 복사해 공유하세요.</p>" +
      '<input id="share-url" type="text" readonly>' +
      '<div class="share-actions">' +
      '<button id="share-copy" type="button" class="sp-primary">복사</button>' +
      '<button id="share-close" type="button" class="sp-ghost">닫기</button>' +
      "</div></div>";
    document.body.appendChild(ov);
    const input = ov.querySelector("#share-url");
    input.value = url;
    input.focus();
    input.select();
    const close = () => ov.remove();
    ov.querySelector("#share-copy").addEventListener("click", async () => {
      const ok = await copyLink(url);
      if (ok) { showToast("링크가 복사되었습니다."); close(); }
      else { input.focus(); input.select(); showToast("주소를 길게 눌러(또는 Ctrl+C로) 복사해 주세요."); }
    });
    ov.querySelector("#share-close").addEventListener("click", close);
    ov.addEventListener("click", (e) => { if (e.target === ov) close(); });
    document.addEventListener("keydown", function esc(e) {
      if (e.key === "Escape") { close(); document.removeEventListener("keydown", esc); }
    });
  }

  const shareBtn = document.getElementById("btn-share");
  if (shareBtn) {
    shareBtn.addEventListener("click", async () => {
      const url = shareUrl();
      if (navigator.share) {
        try { await navigator.share({ title: document.title, text: "PSAT 기출 정답·해설·문제지 모음", url }); return; }
        catch (err) { if (err && err.name === "AbortError") return; /* 그 외엔 복사로 폴백 */ }
      }
      const ok = await copyLink(url);
      if (ok) showToast("링크가 복사되었습니다. 붙여넣어 공유해 보세요!");
      else openSharePopup(url);
    });
  }

  const bookmarkBtn = document.getElementById("btn-bookmark");
  if (bookmarkBtn) {
    bookmarkBtn.addEventListener("click", () => {
      const ua = navigator.userAgent || "";
      const isMobile = /Android|iPhone|iPad|iPod/i.test(ua);
      if (isMobile) {
        showToast("브라우저 메뉴(공유)에서 ‘즐겨찾기’ 또는 ‘홈 화면에 추가’를 선택하세요.");
      } else {
        const isMac = /Mac/i.test(navigator.platform || ua);
        showToast((isMac ? "⌘ + D" : "Ctrl + D") + " 를 눌러 즐겨찾기에 추가하세요.");
      }
    });
  }

  /* ---------- 해설·PDF 클릭 추적 (GA4) ---------- */
  el.result.addEventListener("click", function (e) {
    const a = e.target.closest("a[data-ev]");
    if (!a || typeof gtag !== "function") return;
    if (a.dataset.ev === "solution") {
      gtag("event", "solution_click", {
        item: a.dataset.item,
        exam: a.dataset.exam,
        area: a.dataset.area,
        question: Number(a.dataset.q),
        sol_type: a.dataset.type,
      });
    } else if (a.dataset.ev === "pdf") {
      gtag("event", "pdf_download", {
        exam: a.dataset.exam,
        area: a.dataset.area,
      });
    }
  });

  /* ---------- 초기화 ---------- */
  renderCategories();
})();

</script>
</body>
</html>
